<!doctype html>
<html>
  <head>
    <title>com.fredemmott.audioutputswitch PI</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/sdpi.css" />
    <style>
      .platform-mac .windows-only {
        display: none;
      }

      .icon-picker-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .icon-picker-content {
        background-color: #2d2d2d;
        margin: 5% auto;
        padding: 20px;
        border: 1px solid #444;
        width: 80%;
        max-height: 80vh;
        overflow-y: auto;
        border-radius: 5px;
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        margin: 15px 0;
      }

      .icon-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        background: #3a3a3a;
        border: 2px solid #555;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
        box-sizing: border-box;
        overflow: hidden;
      }

      .icon-item:hover {
        background: #4a4a4a;
        border-color: #0078d4;
      }

      .icon-item.selected {
        border-color: #0078d4;
        background: #1a3a5c;
      }

      .icon-item img {
        width: 40px;
        height: 40px;
        object-fit: contain;
        margin-bottom: 5px;
      }

      .icon-item-name {
        font-size: 11px;
        text-align: center;
        color: #aaa;
        word-break: break-word;
      }

      .upload-zone {
        border: 2px dashed #0078d4;
        border-radius: 5px;
        padding: 20px;
        text-align: center;
        margin: 10px 0;
        background: #3a3a3a;
        cursor: pointer;
      }

      .upload-zone:hover {
        background: #4a4a4a;
      }

      .modal-close {
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        color: #aaa;
      }

      .modal-close:hover {
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="sdpi-wrapper hidden" id="mainWrapper">
      <div type="radio" class="sdpi-item">
        <div class="sdpi-item-label">Direction</div>
        <div class="sdpi-item-value">
          <span class="sdpi-item-child">
            <input
              id="input"
              type="radio"
              name="direction"
              value="input"
              onchange="updateDirection()"
            />
            <label for="input" class="sdpi-item-label"
              ><span></span>Input</label
            >
          </span>
          <span class="sdpi-item-child">
            <input
              id="output"
              type="radio"
              name="direction"
              value="output"
              onchange="updateDirection()"
            />
            <label for="output" class="sdpi-item-label"
              ><span></span>Output</label
            >
          </span>
        </div>
      </div>
      <div type="radio" class="sdpi-item windows-only">
        <div class="sdpi-item-label">Role</div>
        <div class="sdpi-item-value">
          <span class="sdpi-item-child">
            <input
              id="defaultRole"
              type="radio"
              name="role"
              value="default"
              onchange="saveSettings()"
            />
            <label for="defaultRole" class="sdpi-item-label"
              ><span></span>Default</label
            >
          </span>
          <span class="sdpi-item-child">
            <input
              id="communicationRole"
              type="radio"
              name="role"
              value="communication"
              onchange="saveSettings()"
            />
            <label for="communicationRole" class="sdpi-item-label"
              ><span></span>Communications</label
            >
          </span>
          <span class="sdpi-item-child">
            <input
              id="bothRole"
              type="radio"
              name="role"
              value="both"
              onchange="saveSettings()"
            />
            <label for="bothRole" class="sdpi-item-label"
              ><span></span>Both</label
            >
          </span>
        </div>
      </div>
      <div type="select" class="sdpi-item">
        <div class="sdpi-item-label">Devices</div>
        <div class="sdpi-item-value" style="display: flex">
          <button id="addDeviceBtn" onclick="addDevice()">Add</button>
          <select class="sdpi-item-value select" id="deviceSelect"></select>
        </div>
      </div>
      <div id="deviceList" style="margin-left: 20px"></div>
      <div type="select" class="sdpi-item">
        <div class="sdpi-item-label">Device matching</div>
        <select
          class="sdpi-item-value select"
          id="matchStrategy"
          onchange="saveSettings()"
        >
          <option value="ID">Exact</option>
          <option value="Fuzzy">Fuzzy</option>
        </select>
      </div>
    </div>

    <!-- Icon Picker Modal -->
    <div id="iconPickerModal" class="icon-picker-modal">
      <div class="icon-picker-content">
        <span class="modal-close" onclick="closeIconPicker()">&times;</span>
        <h3 id="iconPickerTitle">Select Icon</h3>

        <h4>Built-in Icons</h4>
        <div class="icon-grid" id="builtinIcons"></div>

        <h4>Custom Icons</h4>
        <div class="upload-zone" id="dropZone">
          <p>Drag & drop PNG/JPG/WebP files here or click to upload</p>
          <input
            type="file"
            id="fileInput"
            multiple
            accept="image/png,image/jpeg,image/webp"
            style="display: none"
          />
        </div>
        <div class="icon-grid" id="customIcons"></div>
      </div>
    </div>

    <script src="common.js"></script>
    <script>
      /** Step 1: Subscribe to the 'connected' event
       * and call your own initialization method.
       * The connected - event is emitted, when StreamDeck
       * has established a connection.
       * The 'connected' event carries a JSON object containing
       * necessary information about the connection and the
       * inital data.
       */
      var uuid, actionInfo, inputDevices, outputDevices, settings, ctx;

      $SD.on("connected", (jsonObj) => connected(jsonObj));
      $SD.on("sendToPropertyInspector", (jsonObj) =>
        receivedDataFromPlugin(jsonObj),
      );

      function receivedDataFromPlugin(jsonObj) {
        const payload = jsonObj["payload"];
        const event = payload["event"];

        // Handle file data from plugin
        if (event === "fileData") {
          console.log("Received fileData from plugin for:", payload.fileName);
          if (payload.base64Data) {
            // Generate short name for the image
            customImageCounter++;
            const shortName = `img${customImageCounter}`;
            const dataUrl = "data:image/jpeg;base64," + payload.base64Data;

            // Crop the image to a square before storing
            cropImageToSquare(dataUrl, (croppedDataUrl) => {
              customImages[shortName] = croppedDataUrl;
              console.log(
                `Stored custom image as: ${shortName}, sending to plugin`,
              );

              // Send the image to C++ for persistent storage on disk.
              // We do NOT store it in settings — that would bloat the
              // WebSocket messages and cause disconnects.
              $SD.api.sendToPlugin(uuid, actionInfo, {
                event: "storeCustomImage",
                name: shortName,
                data: croppedDataUrl,
              });

              populateIconPicker();
            });
          }
          return;
        }

        // Handle individual custom image from plugin (sent on PI open)
        if (event === "customImage") {
          if (payload.name && payload.data) {
            customImages[payload.name] = payload.data;
            // Update counter
            const match = payload.name.match(/img(\d+)/);
            if (match) {
              customImageCounter = Math.max(
                customImageCounter,
                parseInt(match[1]),
              );
            }
          }
          return;
        }

        // All custom images have been received — refresh picker if open
        if (event === "customImagesDone") {
          console.log(
            "Received all custom images from plugin:",
            Object.keys(customImages).length,
          );
          populateIconPicker();
          return;
        }

        // Handle device list
        if (event !== "getDeviceList") {
          return;
        }

        const isInput = settings.direction == "input";
        document.getElementById("input").checked = isInput;
        document.getElementById("output").checked = !isInput;

        const roleValue = settings.role || "default";
        document.getElementById("defaultRole").checked =
          roleValue === "default";
        document.getElementById("communicationRole").checked =
          roleValue === "communication";
        document.getElementById("bothRole").checked = roleValue === "both";

        const matchStrategy = settings.matchStrategy || "ID";
        for (const child of document.getElementById("matchStrategy").children) {
          if (child.value == matchStrategy) {
            child.setAttribute("selected", "selected");
          } else {
            child.removeAttribute("selected");
          }
        }

        inputDevices = payload["inputDevices"];
        outputDevices = payload["outputDevices"];

        updateDeviceLists(isInput ? inputDevices : outputDevices);
        document.getElementById("mainWrapper").classList.remove("hidden");
      }

      function updateDeviceLists(devices) {
        const deviceSelector = document.getElementById("deviceSelect");
        const deviceListDiv = document.getElementById("deviceList");

        const configuredDevices = settings["devices"] || [];

        const state_sort = {
          connected: 0,
          device_present_no_connection: 1,
          device_not_present: 2,
          device_disabled: 3,
        };

        // Clear and populate device selector
        while (deviceSelector.firstChild) {
          deviceSelector.removeChild(deviceSelector.firstChild);
        }

        const sortedIds = Object.keys(devices).sort((a_id, b_id) => {
          const a = devices[a_id];
          const b = devices[b_id];

          if (state_sort[a.state] < state_sort[b.state]) {
            return -1;
          }
          if (state_sort[a.state] > state_sort[b.state]) {
            return 1;
          }
          if (a.displayName < b.displayName) {
            return -1;
          }
          if (a.displayName > b.displayName) {
            return 1;
          }
          return 0;
        });

        sortedIds.forEach((deviceId) => {
          const device = devices[deviceId];

          const isConfigured = configuredDevices.some(
            (d) => (typeof d == "object" ? d.id : d) === deviceId,
          );

          // Only show connected or unplugged devices - exclude disabled/not present devices
          if (
            device.state !== "connected" &&
            device.state !== "device_present_no_connection"
          ) {
            // Skip disabled and not present devices
            return;
          }

          // Skip devices that are already configured
          if (isConfigured) {
            return;
          }

          const displayName =
            device.displayName +
            {
              connected: "",
              device_present_no_connection: " (unplugged)",
              device_not_present: " (not present)",
              device_disabled: " (disabled)",
            }[device.state];

          const option = document.createElement("option");
          option.setAttribute("value", deviceId);
          option.setAttribute("label", displayName);

          deviceSelector.appendChild(option);
        });

        // Update the list of configured devices
        updateConfiguredDevicesList(devices);
        validateAddButton();
      }

      function updateConfiguredDevicesList(devices) {
        const deviceListDiv = document.getElementById("deviceList");
        const configuredDevices = settings["devices"] || [];

        while (deviceListDiv.firstChild) {
          deviceListDiv.removeChild(deviceListDiv.firstChild);
        }

        const iconOptions = ["headphones", "speakers", "active", "inactive"];

        configuredDevices.forEach((device, index) => {
          const deviceId = typeof device == "object" ? device.id : device;
          const deviceObj = devices[deviceId];
          const displayName = deviceObj ? deviceObj.displayName : deviceId;
          const currentIcon =
            typeof device == "object" && device.icon
              ? device.icon
              : iconOptions[index % iconOptions.length];

          const itemDiv = document.createElement("div");
          itemDiv.style.display = "flex";
          itemDiv.style.alignItems = "center";
          itemDiv.style.marginBottom = "5px";
          itemDiv.style.gap = "5px";

          const label = document.createElement("span");
          label.textContent = `${index + 1}. ${displayName}`;
          label.style.flex = "1";

          const iconBtn = document.createElement("button");
          iconBtn.style.minWidth = "80px";
          iconBtn.textContent = currentIcon;
          iconBtn.onclick = () => openIconPicker(index);

          const removeBtn = document.createElement("button");
          removeBtn.textContent = "Remove";
          removeBtn.onclick = () => removeDevice(index);

          itemDiv.appendChild(label);
          itemDiv.appendChild(iconBtn);
          itemDiv.appendChild(removeBtn);
          deviceListDiv.appendChild(itemDiv);
        });
      }

      function validateAddButton() {
        const deviceSelector = document.getElementById("deviceSelect");
        const addBtn = document.getElementById("addDeviceBtn");
        // Disable button if there are no devices to add (dropdown is empty)
        addBtn.disabled = deviceSelector.children.length === 0;
      }

      function addDevice() {
        const deviceSelector = document.getElementById("deviceSelect");
        const deviceId = deviceSelector.value;

        if (!deviceId) {
          return;
        }

        const isInput = document.getElementById("input").checked;
        const devices = isInput ? inputDevices : outputDevices;
        const device = devices[deviceId];

        const configuredDevices = settings["devices"] || [];
        const isDuplicate = configuredDevices.some(
          (d) => (typeof d == "object" ? d.id : d) === deviceId,
        );

        if (!isDuplicate) {
          configuredDevices.push(device);
          settings.devices = configuredDevices;
          updateConfiguredDevicesList(devices);
          validateAddButton();
          saveSettings();
          deviceSelector.value = "";
          $SD.api.sendToPlugin(uuid, actionInfo, {
            event: "addDevice",
            device: device,
          });
          // Request device list to refresh UI
          $SD.api.sendToPlugin(uuid, actionInfo, { event: "getDeviceList" });
        } else {
          alert(
            "This device is already configured. Please select a different device.",
          );
        }
      }

      function removeDevice(index) {
        const configuredDevices = settings["devices"] || [];
        configuredDevices.splice(index, 1);
        settings.devices = configuredDevices;
        const isInput = document.getElementById("input").checked;
        const devices = isInput ? inputDevices : outputDevices;
        updateConfiguredDevicesList(devices);
        validateAddButton();
        saveSettings();
        $SD.api.sendToPlugin(uuid, actionInfo, {
          event: "removeDevice",
          index: index,
        });
        // Request device list to refresh UI
        $SD.api.sendToPlugin(uuid, actionInfo, { event: "getDeviceList" });
      }

      function updateDirection() {
        if (document.getElementById("input").checked) {
          updateDeviceLists(inputDevices);
        } else {
          updateDeviceLists(outputDevices);
        }
        saveSettings();
      }

      function connected(jsonObj) {
        uuid = jsonObj.uuid;
        actionInfo = jsonObj.actionInfo.action;
        ctx = jsonObj.actionInfo.context;
        settings = jsonObj.actionInfo.payload.settings;
        const platform = jsonObj.applicationInfo.application.platform;
        document
          .getElementById("mainWrapper")
          .classList.add(`platform-${platform}`);

        // Restore custom images from plugin (not from settings)
        // Request the C++ plugin to send us all stored custom images
        $SD.api.sendToPlugin(uuid, actionInfo, { event: "getCustomImages" });

        // request settings and list of devices
        $SD.api.sendToPlugin(uuid, actionInfo, { event: "getDeviceList" });
      }

      function saveSettings() {
        const isInput = document.getElementById("input").checked;
        settings.direction = isInput ? "input" : "output";

        if (document.getElementById("defaultRole").checked) {
          settings.role = "default";
        } else if (document.getElementById("communicationRole").checked) {
          settings.role = "communication";
        } else if (document.getElementById("bothRole").checked) {
          settings.role = "both";
        }

        settings.matchStrategy = document.getElementById("matchStrategy").value;

        // Strip customImages before sending — it contains large base64
        // data that causes WebSocket disconnects.
        const settingsToSave = Object.assign({}, settings);
        delete settingsToSave.customImages;
        console.log(settingsToSave);
        $SD.api.setSettings(uuid, settingsToSave);
      }

      // Icon picker functions
      var currentIconPickerDeviceIndex = -1;
      var customImages = {};
      var customImageCounter = 0; // Counter to generate short names

      function openIconPicker(deviceIndex) {
        currentIconPickerDeviceIndex = deviceIndex;

        // Update title with the device name
        const configuredDevices = settings["devices"] || [];
        const device = configuredDevices[deviceIndex];
        const deviceId = typeof device === "object" ? device.id : device;
        const isInput = document.getElementById("input").checked;
        const devices = isInput ? inputDevices : outputDevices;
        const deviceName =
          devices && devices[deviceId]
            ? devices[deviceId].displayName
            : deviceId;
        document.getElementById("iconPickerTitle").textContent =
          `Select Icon — ${deviceName}`;

        populateIconPicker();
        document.getElementById("iconPickerModal").style.display = "block";
      }

      function closeIconPicker() {
        document.getElementById("iconPickerModal").style.display = "none";
      }

      function populateIconPicker() {
        const builtinIcons = ["headphones", "speakers", "active", "inactive"];
        const builtinContainer = document.getElementById("builtinIcons");
        builtinContainer.innerHTML = "";

        // Determine the currently selected icon for this device
        const configuredDevices = settings["devices"] || [];
        const defaultIcons = ["headphones", "speakers", "active", "inactive"];
        let currentSelectedIcon = "";
        if (
          currentIconPickerDeviceIndex >= 0 &&
          currentIconPickerDeviceIndex < configuredDevices.length
        ) {
          const dev = configuredDevices[currentIconPickerDeviceIndex];
          currentSelectedIcon =
            typeof dev === "object" && dev.icon
              ? dev.icon
              : defaultIcons[
                  currentIconPickerDeviceIndex % defaultIcons.length
                ];
        }

        builtinIcons.forEach((iconName) => {
          const item = document.createElement("div");
          item.className =
            "icon-item" + (iconName === currentSelectedIcon ? " selected" : "");
          item.style.cursor = "pointer";
          item.innerHTML = `<span class="icon-item-name">${iconName}</span>`;
          item.onclick = (e) => {
            e.stopPropagation();
            selectIcon(iconName);
          };
          builtinContainer.appendChild(item);
        });

        // Populate custom icons
        const customContainer = document.getElementById("customIcons");
        customContainer.innerHTML = "";
        console.log(
          "Populating custom icons, found:",
          Object.keys(customImages).length,
          "items",
        );

        for (const [name, data] of Object.entries(customImages)) {
          const item = document.createElement("div");
          item.className =
            "icon-item" + (name === currentSelectedIcon ? " selected" : "");
          item.style.display = "flex";
          item.style.flexDirection = "column";
          item.style.cursor = "pointer";
          item.style.position = "relative";
          item.style.backgroundColor =
            name === currentSelectedIcon ? "#1a3a5c" : "#3a3a3a";
          item.style.width = "100px";
          item.style.boxSizing = "border-box";

          // Create header with name and delete button
          const header = document.createElement("div");
          header.style.display = "flex";
          header.style.justifyContent = "space-between";
          header.style.alignItems = "center";
          header.style.padding = "5px";
          header.style.borderBottom = "1px solid #555";

          // Image name
          const nameSpan = document.createElement("span");
          nameSpan.className = "icon-item-name";
          nameSpan.textContent = name;
          nameSpan.style.flex = "1";
          nameSpan.style.fontSize = "11px";
          nameSpan.style.overflow = "hidden";
          nameSpan.style.textOverflow = "ellipsis";
          nameSpan.style.whiteSpace = "nowrap";
          header.appendChild(nameSpan);

          // Delete button
          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-icon-btn";
          deleteBtn.title = "Delete custom image";
          deleteBtn.innerHTML = "✕";
          deleteBtn.style.width = "20px";
          deleteBtn.style.setProperty("height", "20px", "important");
          deleteBtn.style.minWidth = "20px";
          deleteBtn.style.setProperty("min-height", "20px", "important");
          deleteBtn.style.padding = "0";
          deleteBtn.style.marginLeft = "5px";
          deleteBtn.style.borderRadius = "50%";
          deleteBtn.style.backgroundColor = "rgba(255, 0, 0, 0.8)";
          deleteBtn.style.color = "white";
          deleteBtn.style.border = "none";
          deleteBtn.style.fontSize = "12px";
          deleteBtn.style.lineHeight = "1";
          deleteBtn.style.cursor = "pointer";
          deleteBtn.style.transition = "background-color 0.2s";
          deleteBtn.style.flexShrink = "0";
          deleteBtn.style.flexGrow = "0";
          deleteBtn.style.alignSelf = "center";
          deleteBtn.style.display = "flex";
          deleteBtn.style.alignItems = "center";
          deleteBtn.style.justifyContent = "center";
          deleteBtn.onmouseenter = () => {
            deleteBtn.style.backgroundColor = "rgba(255, 0, 0, 1)";
          };
          deleteBtn.onmouseleave = () => {
            deleteBtn.style.backgroundColor = "rgba(255, 0, 0, 0.8)";
          };
          deleteBtn.onclick = (e) => {
            e.stopPropagation();
            console.log("Delete button clicked for:", name);
            deleteImage(name);
          };
          header.appendChild(deleteBtn);
          item.appendChild(header);

          // Image preview container
          const imagePreview = document.createElement("div");
          imagePreview.style.width = "100%";
          imagePreview.style.height = "100px";
          imagePreview.style.backgroundImage = `url('${data}')`;
          imagePreview.style.backgroundSize = "cover";
          imagePreview.style.backgroundPosition = "center";
          imagePreview.style.cursor = "pointer";
          item.appendChild(imagePreview);

          item.onclick = (e) => {
            e.stopPropagation();
            console.log("Clicked custom image:", name);
            selectIcon(name);
          };
          customContainer.appendChild(item);
        }
      }

      function selectIcon(iconName) {
        console.log("selectIcon called with:", iconName);
        if (currentIconPickerDeviceIndex >= 0) {
          const configuredDevices = settings["devices"] || [];
          if (currentIconPickerDeviceIndex < configuredDevices.length) {
            const device = configuredDevices[currentIconPickerDeviceIndex];
            console.log(
              "Setting icon for device index",
              currentIconPickerDeviceIndex,
              "to:",
              iconName,
            );
            if (typeof device === "object") {
              device.icon = iconName;
            } else {
              configuredDevices[currentIconPickerDeviceIndex] = {
                id: device,
                icon: iconName,
              };
            }
            settings.devices = configuredDevices;
            const isInput = document.getElementById("input").checked;
            const devices = isInput ? inputDevices : outputDevices;
            console.log("Updated devices, refreshing list");
            updateConfiguredDevicesList(devices);
            saveSettings();

            // Trigger plugin to update the button state with the new icon
            console.log(
              "Requesting plugin to update state for device index:",
              currentIconPickerDeviceIndex,
              "with icon:",
              iconName,
            );
            $SD.api.sendToPlugin(uuid, actionInfo, {
              event: "updateState",
              deviceIndex: currentIconPickerDeviceIndex,
              icon: iconName,
            });
            console.log("Settings saved");
          } else {
            console.error("Device index out of range");
          }
        } else {
          console.error("No device selected in icon picker");
        }
        closeIconPicker();
      }

      function cropImageToSquare(dataUrl, callback) {
        const img = new Image();
        img.onload = function () {
          const canvas = document.createElement("canvas");
          // Resize to 144x144 (StreamDeck button is 72px, 144 for retina).
          // Without this, full-resolution images produce huge base64 strings
          // that exceed the StreamDeck WebSocket message size limit.
          const targetSize = 144;
          canvas.width = targetSize;
          canvas.height = targetSize;

          const ctx = canvas.getContext("2d");
          const size = Math.min(img.width, img.height);
          const x = (img.width - size) / 2;
          const y = (img.height - size) / 2;

          // Crop to center square and scale down to targetSize in one step
          ctx.drawImage(img, x, y, size, size, 0, 0, targetSize, targetSize);

          const croppedDataUrl = canvas.toDataURL("image/png");
          console.log(
            `Cropped and resized image from ${img.width}x${img.height} to ${targetSize}x${targetSize}`,
          );
          callback(croppedDataUrl);
        };
        img.onerror = function () {
          console.error("Failed to load image for cropping");
          callback(dataUrl); // Return original if cropping fails
        };
        img.src = dataUrl;
      }

      function deleteImage(imageName) {
        console.log("deleteImage called for:", imageName);

        // Remove from local customImages
        delete customImages[imageName];

        // Remove any device icon references
        const configuredDevices = settings["devices"] || [];
        for (const device of configuredDevices) {
          if (typeof device === "object" && device.icon === imageName) {
            delete device.icon;
          }
        }
        settings.devices = configuredDevices;
        saveSettings();

        // Notify plugin to delete the image from disk
        $SD.api.sendToPlugin(uuid, actionInfo, {
          event: "deleteImage",
          imageName: imageName,
        });

        populateIconPicker();
      }

      // File upload and drag-drop
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");

      console.log(
        "Setting up file upload handlers. dropZone:",
        dropZone !== null,
        "fileInput:",
        fileInput !== null,
      );

      if (dropZone) {
        dropZone.addEventListener("click", () => {
          console.log("dropZone clicked, triggering fileInput");
          fileInput.click();
        });
        dropZone.addEventListener("dragover", (e) => {
          console.log("dragover event");
          e.preventDefault();
          dropZone.style.background = "#4a4a4a";
        });
        dropZone.addEventListener("dragleave", () => {
          console.log("dragleave event");
          dropZone.style.background = "#3a3a3a";
        });
        dropZone.addEventListener("drop", (e) => {
          console.log("drop event, files:", e.dataTransfer.files.length);
          e.preventDefault();
          dropZone.style.background = "#3a3a3a";
          handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener("change", (e) => {
          console.log("fileInput change event, files:", e.target.files.length);
          handleFiles(e.target.files);
          // Reset the input so the same file can be selected again
          e.target.value = "";
        });
      } else {
        console.error("dropZone element not found!");
      }

      function handleFiles(files) {
        console.log("handleFiles called with", files.length, "files");
        // Since FileReader doesn't work in StreamDeck's WebView due to security restrictions,
        // we'll send the file paths to the plugin to read them
        const fileArray = Array.from(files);

        fileArray.forEach((file, index) => {
          console.log(
            `[${index}] File object: name=${file.name}, type=${file.type}, size=${file.size}`,
          );

          if (!file.type.startsWith("image/")) {
            console.warn(`[${index}] Skipping non-image file: ${file.type}`);
            return;
          }

          // File size 0 indicates the WebView can't access the file directly
          // Request the plugin to read the file instead
          if (file.size === 0) {
            console.log(
              `[${index}] File size is 0, requesting plugin to read file`,
            );
            $SD.api.sendToPlugin(uuid, actionInfo, {
              event: "readFile",
              fileName: file.name,
              fileType: file.type,
            });
          } else {
            // If somehow size > 0, try FileReader
            const reader = new FileReader();
            const fileName = file.name;

            reader.onerror = function (e) {
              console.error(
                `[${index}] FileReader error for ${fileName}:`,
                reader.error?.name,
                reader.error?.message,
              );
            };

            reader.onload = function (e) {
              try {
                const result = e.target?.result;
                if (!result) {
                  console.error(
                    `[${index}] FileReader result is empty for ${fileName}`,
                  );
                  return;
                }

                const baseName = fileName.replace(/\.[^/.]+$/, "");
                console.log(
                  `[${index}] File loaded successfully (${result.length} bytes), storing as: ${baseName}`,
                );
                customImages[baseName] = result;
                populateIconPicker();
              } catch (err) {
                console.error(
                  `[${index}] Error in FileReader.onload:`,
                  err?.message || err,
                );
              }
            };

            console.log(
              `[${index}] Starting FileReader.readAsDataURL for ${fileName}`,
            );
            reader.readAsDataURL(file);
          }
        });
      }

      window.onclick = function (event) {
        const modal = document.getElementById("iconPickerModal");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };
    </script>
  </body>
</html>
